# Rep mapping. Each AccuLynx user_id (`rep_id`) maps to one outbound identity.
#
# Solo-sender mode bypass:
#   When SOLO_SENDER_MODE=true in .env, every lead routes to the rep with
#   rep_id="*" regardless of AccuLynx assignment. Flip to false once the 5 real
#   reps below are verified as SendGrid Single Senders and their AccuLynx UUIDs
#   are filled in.
#
# Bootstrap procedure for the 5 real reps:
#   1. Verify each rep's email as a SendGrid Single Sender (Marketing → Senders).
#      Each rep clicks the verification email from their inbox. ~5 min apiece.
#   2. Run `python scripts/inspect_rep_link.py` against the live AccuLynx API
#      to dump /users and grab each rep's UUID. Update the `rep_id` fields below.
#   3. Allocate per-rep Twilio numbers (or leave blank to share twilio_phone_number
#      from settings until A2P lands). Update the `twilio_phone` fields below.
#   4. Set SOLO_SENDER_MODE=false in .env.
#
# Known AccuLynx user IDs (from prior /users dump):
#   aj@moderndayroof.com               -> 4ea127be-7494-4b8c-a603-4b99b209ab24
#   aliciaumberto@moderndayroof.com    -> ecae74b2-a28d-4775-9c80-0851e6010ddb  (LocationAdmin)
#   alexbohm@moderndayroof.com         -> 0bb3a2a5-49fc-4f6d-8d89-a8c56855fc93  (CompanyAdmin)
#   austin@moderndayroof.com           -> 88887648-9d02-4ece-ab42-56c0d64d07bc

